name: Nightly Full Test Suite

on:
  schedule:
    # Run at 4:00 AM UTC every day (11 PM ET / 8 PM PT)
    - cron: '0 4 * * *'
  workflow_dispatch:  # Allow manual trigger

# Cancel in-progress nightly runs (only one should run at a time)
concurrency:
  group: nightly-tests
  cancel-in-progress: true

env:
  CC: ccache clang
  CXX: ccache clang++

jobs:
  gate:
    name: Upstream gate
    if: github.repository == 'prestonbrown/helixscreen'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running on upstream repo"

  # ===========================================================================
  # Shared build step — produces binary + test binary as artifacts
  # ===========================================================================
  build:
    name: Build
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev clang make python3 python3-venv npm \
            libssl-dev pkg-config libfmt-dev libcairo2-dev \
            libpango1.0-dev libpng-dev libjpeg-dev \
            libnl-3-dev libnl-genl-3-dev libxml2-utils libusb-1.0-0-dev \
            libsystemd-dev libbluetooth-dev ccache

    - name: Cache compiled dependencies
      uses: actions/cache@v5
      with:
        path: |
          build/lib/
          lib/libhv/lib/
          lib/libhv/include/hv/

        key: deps-ubuntu-22.04-${{ hashFiles('lib/libhv/**/*.c', 'lib/libhv/**/*.cpp', 'lib/libhv/**/*.h', 'lib/wpa_supplicant/src/**/*.c', 'lib/wpa_supplicant/src/**/*.h', 'Makefile', 'mk/deps.mk') }}
        restore-keys: deps-ubuntu-22.04-

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-nightly-${{ github.sha }}
        restore-keys: |
          ccache-nightly-
          ccache-ubuntu-22.04-

    - name: Install Node.js dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: npm install

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=500M
        ccache --set-config=compression=true
        ccache -z

    - name: Setup Python venv
      run: make venv-setup

    - name: Build application + tests
      timeout-minutes: 120
      run: |
        make -j$(nproc)
        make test
        ccache -s

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nightly-build
        path: |
          build/bin/helix-screen
          build/bin/helix-tests
        retention-days: 1

  # ===========================================================================
  # Test-all: every C++ test including [slow] (excludes only hidden [.] tests)
  # ===========================================================================
  test-all:
    name: All C++ Tests (incl. slow)
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install runtime deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libfmt-dev libcairo2 libpango-1.0-0 libpng16-16 libjpeg8 libnl-3-200 libnl-genl-3-200

    - name: Download build
      uses: actions/download-artifact@v8
      with:
        name: nightly-build
        path: build/bin/

    - name: Fix permissions
      run: chmod +x build/bin/helix-screen build/bin/helix-tests

    - name: Enable core dumps
      # Test processes have been observed segfaulting on *exit* after "All tests
      # passed" (fast-test shards 1+7 and the slow-tests job in recent nightlies).
      # Drop cores into the workspace so the "Upload core dumps" step can grab
      # them if a step fails.
      run: |
        ulimit -c unlimited
        sudo mkdir -p /tmp/cores
        sudo chmod 1777 /tmp/cores
        echo '/tmp/cores/core.%e.%p.%t' | sudo tee /proc/sys/kernel/core_pattern
        cat /proc/sys/kernel/core_pattern

    - name: Run fast tests in parallel shards
      timeout-minutes: 15
      run: |
        ulimit -c unlimited
        NPROCS=$(( $(nproc) * 2 ))
        echo "Running $NPROCS test shards in parallel (excluding slow)..."
        pids=""
        for i in $(seq 0 $((NPROCS-1))); do
          (timeout 300 ./build/bin/helix-tests "~[.] ~[slow]" --shard-count $NPROCS --shard-index $i --durations yes 2>&1 | sed "s/^/[shard $i] /") &
          pids="$pids $!"
        done
        failed=0
        for pid in $pids; do
          wait $pid
          status=$?
          if [ $status -eq 124 ]; then
            echo "A test shard timed out!"
            failed=1
          elif [ $status -ne 0 ]; then
            failed=1
          fi
        done
        if [ $failed -eq 1 ]; then
          echo "One or more test shards failed!"
          exit 1
        fi
        echo "Fast tests passed"

    - name: Run slow tests sequentially
      timeout-minutes: 30
      run: |
        ulimit -c unlimited
        echo "Running [slow] tests sequentially (thread-based tests deadlock under parallel sharding)..."
        timeout 1680 ./build/bin/helix-tests "[slow]" --durations yes
        echo "Slow tests passed"

    - name: Inspect core dumps (on failure)
      if: failure()
      run: |
        echo "=== Core files in /tmp/cores ==="
        ls -la /tmp/cores/ 2>/dev/null || echo "no core files"
        for core in /tmp/cores/core.*; do
          [ -f "$core" ] || continue
          echo "=== $core ==="
          file "$core" || true
          # Best-effort backtrace if gdb is available
          if command -v gdb >/dev/null 2>&1; then
            sudo apt-get install -qq -y gdb >/dev/null 2>&1 || true
            gdb --batch -ex "bt 40" -ex "thread apply all bt 20" \
                ./build/bin/helix-tests "$core" 2>&1 | tail -120 || true
          fi
        done

    - name: Upload core dumps (on failure)
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        # Match the helix-tests binary already uploaded as 'nightly-build'.
        # Skipping the binary here keeps the artifact small (~MB instead of GB).
        name: test-cores-${{ github.run_id }}
        path: /tmp/cores/core.*
        if-no-files-found: ignore
        retention-days: 7

  # ===========================================================================
  # Event loop / WebSocket stress tests (5-10 min, run separately)
  # ===========================================================================
  test-eventloop:
    name: Event Loop Stress Tests
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install runtime deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libfmt-dev libcairo2 libpango-1.0-0 libpng16-16 libjpeg8 libnl-3-200 libnl-genl-3-200

    - name: Download build
      uses: actions/download-artifact@v8
      with:
        name: nightly-build
        path: build/bin/

    - name: Fix permissions
      run: chmod +x build/bin/helix-tests

    - name: Run eventloop tests
      timeout-minutes: 15
      run: |
        ./build/bin/helix-tests "[eventloop]" --durations yes
        echo "Event loop tests passed"

  # ===========================================================================
  # Shell / BATS tests (installer, service, platform scripts)
  # ===========================================================================
  test-shell:
    name: Shell Tests (BATS)
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install bats
      run: |
        sudo npm install -g bats

    - name: Run shell tests
      run: bats tests/shell/

  # ===========================================================================
  # AddressSanitizer — detect memory bugs, leaks, buffer overflows
  # ===========================================================================
  test-asan:
    name: AddressSanitizer
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev clang make python3 python3-venv npm \
            libssl-dev pkg-config libfmt-dev libcairo2-dev \
            libpango1.0-dev libpng-dev libjpeg-dev \
            libnl-3-dev libnl-genl-3-dev libxml2-utils libusb-1.0-0-dev \
            libsystemd-dev libbluetooth-dev ccache

    - name: Cache compiled dependencies
      uses: actions/cache@v5
      with:
        path: |
          build/lib/
          lib/libhv/lib/
          lib/libhv/include/hv/

        key: deps-ubuntu-22.04-${{ hashFiles('lib/libhv/**/*.c', 'lib/libhv/**/*.cpp', 'lib/libhv/**/*.h', 'lib/wpa_supplicant/src/**/*.c', 'lib/wpa_supplicant/src/**/*.h', 'Makefile', 'mk/deps.mk') }}
        restore-keys: deps-ubuntu-22.04-

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-asan-${{ github.sha }}
        restore-keys: |
          ccache-asan-
          ccache-nightly-
          ccache-ubuntu-22.04-

    - name: Install Node.js dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: npm install

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=1G
        ccache --set-config=compression=true
        ccache -z

    - name: Setup Python venv
      run: make venv-setup

    - name: Apply submodule patches
      run: make apply-patches

    - name: Build and run with ASAN
      timeout-minutes: 230
      run: |
        make test-asan
        echo "ASAN tests complete"

    - name: Upload ASAN report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: asan-report
        path: /tmp/asan_output.txt
        retention-days: 7

  # ===========================================================================
  # ThreadSanitizer — detect data races
  # ===========================================================================
  test-tsan:
    name: ThreadSanitizer
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev clang make python3 python3-venv npm \
            libssl-dev pkg-config libfmt-dev libcairo2-dev \
            libpango1.0-dev libpng-dev libjpeg-dev \
            libnl-3-dev libnl-genl-3-dev libxml2-utils libusb-1.0-0-dev \
            libsystemd-dev libbluetooth-dev ccache

    - name: Cache compiled dependencies
      uses: actions/cache@v5
      with:
        path: |
          build/lib/
          lib/libhv/lib/
          lib/libhv/include/hv/

        key: deps-ubuntu-22.04-${{ hashFiles('lib/libhv/**/*.c', 'lib/libhv/**/*.cpp', 'lib/libhv/**/*.h', 'lib/wpa_supplicant/src/**/*.c', 'lib/wpa_supplicant/src/**/*.h', 'Makefile', 'mk/deps.mk') }}
        restore-keys: deps-ubuntu-22.04-

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-tsan-${{ github.sha }}
        restore-keys: |
          ccache-tsan-
          ccache-nightly-
          ccache-ubuntu-22.04-

    - name: Install Node.js dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: npm install

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=1G
        ccache --set-config=compression=true
        ccache -z

    - name: Setup Python venv
      run: make venv-setup

    - name: Apply submodule patches
      run: make apply-patches

    - name: Build and run with TSAN
      timeout-minutes: 230
      run: |
        # Exclude [eventloop] and [slow] tests — eventloop tests have their own
        # dedicated CI job, and [slow] tests (MoonrakerClientMock fixture) are
        # too expensive under TSAN's 10-50x overhead, causing 230-min timeout.
        make test-tsan TSAN_FILTER="~[.] ~[eventloop] ~[slow]"
        echo "TSAN tests complete"

    - name: Upload TSAN report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: tsan-report
        path: /tmp/tsan_output.txt
        retention-days: 7

  # ===========================================================================
  # Python tests (translations, telemetry analytics)
  # ===========================================================================
  test-python:
    name: Python Tests
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Python tests
      run: pytest tests/python/ -v --tb=short

  # ===========================================================================
  # macOS cross-platform validation — BUILD ONLY.
  #
  # macOS is a dev convenience platform, not a release target. We compile here
  # so a contributor breaking the macOS build is caught nightly, but we don't
  # run the test binary: assertion failures (test_led_native_backend,
  # test_telemetry_manager) and singleton-teardown SIGSEGVs
  # (PrintStatusWidget formatter, consumption_sink_ams) reflect macOS-specific
  # libc++/destructor-order behavior that isn't worth chasing for a non-ship
  # platform. Linux ASAN/TSAN cover the memory-safety signal more rigorously.
  # ===========================================================================
  test-macos:
    name: macOS Build
    needs: gate
    runs-on: macos-14
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false

    - name: Initialize submodules
      uses: ./.github/actions/init-submodules

    - name: Install dependencies
      run: brew install sdl2 libusb ccache coreutils

    - name: Cache compiled dependencies
      uses: actions/cache@v5
      with:
        path: |
          build/lib/
          lib/libhv/lib/
          lib/libhv/include/hv/

        key: deps-macos-14-${{ hashFiles('lib/libhv/**/*.c', 'lib/libhv/**/*.cpp', 'lib/libhv/**/*.h') }}
        restore-keys: deps-macos-14-

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/ccache
        key: ccache-nightly-macos-${{ github.sha }}
        restore-keys: |
          ccache-nightly-macos-
          ccache-macos-14-

    - name: Install Node.js dependencies
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: npm install

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=500M
        ccache --set-config=compression=true
        ccache -z

    - name: Setup Python venv
      run: make venv-setup

    - name: Build HelixScreen
      timeout-minutes: 30
      run: make -j$(sysctl -n hw.ncpu)

    - name: Build tests (compile only, do not run)
      timeout-minutes: 20
      run: make test-build

  # ===========================================================================
  # Final status gate
  # ===========================================================================
  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs: [test-all, test-eventloop, test-shell, test-asan, test-tsan, test-python, test-macos]
    if: always()

    steps:
    - name: Check results
      run: |
        echo "=== Nightly Test Results ==="
        echo "All C++ tests:    ${{ needs.test-all.result }}"
        echo "Event loop:       ${{ needs.test-eventloop.result }}"
        echo "Shell (BATS):     ${{ needs.test-shell.result }}"
        echo "ASAN:             ${{ needs.test-asan.result }}"
        echo "TSAN:             ${{ needs.test-tsan.result }}"
        echo "Python:           ${{ needs.test-python.result }}"
        echo "macOS (build):    ${{ needs.test-macos.result }}"
        echo "==========================="

        FAILED=0
        for job in test-all test-eventloop test-shell test-asan test-tsan test-python test-macos; do
          result="${{ needs[job].result }}" 2>/dev/null || result="unknown"
        done

        if [ "${{ needs.test-all.result }}" != "success" ] || \
           [ "${{ needs.test-eventloop.result }}" != "success" ] || \
           [ "${{ needs.test-shell.result }}" != "success" ] || \
           [ "${{ needs.test-asan.result }}" != "success" ] || \
           [ "${{ needs.test-tsan.result }}" != "success" ] || \
           [ "${{ needs.test-python.result }}" != "success" ] || \
           [ "${{ needs.test-macos.result }}" != "success" ]; then
          echo "::error::Nightly test suite had failures!"
          exit 1
        fi
        echo "All nightly tests passed!"
